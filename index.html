<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSYT TEST</title>

<style>
body{
  background:#050814;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

h1{
  color:#ff2a2a;
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
  background:#0b0f2a;
  color:white;
  border:1px solid red;
}

.info{
  background:#0b0f2a;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.slider-box{
  margin-bottom:15px;
}

input[type=range]{
  width:100%;
}

button{
  width:100%;
  padding:15px;
  background:red;
  border:none;
  border-radius:10px;
  color:white;
  font-size:18px;
}

/* 🔥 เพิ่มใหม่ */
input[type=number], textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid red;
  background:#0b0f2a;
  color:white;
}

textarea{
  height:100px;
  resize:none;
}
</style>
</head>

<body>

<h1>🔥 ระบบให้คะแนน SSYT 🔥</h1>

<select id="playerSelect">
  <option>-- เลือกผู้สมัคร --</option>
</select>

<div class="info" id="infoBox">
ยังไม่ได้เลือกผู้สมัคร
</div>

<div id="sliders"></div>

<h2>คะแนนรวม : <span id="total">0</span> / 100</h2>

<!-- 🔥 เพิ่มใหม่ (ไม่ลบของเดิม) -->
<div class="info">

<label>🏆 เทสผ่านเท่าไหร่</label>
<input type="number" id="passCount" max="1000" placeholder="เช่น 7">

<label>🎮 เทสกี่รอบ</label>
<input type="number" id="roundCount" max="1000" placeholder="เช่น 10">

<label>👤 คนเทส</label>
<select id="tester">
<option value="">-- เลือกคนเทส --</option>
<option>โค่ From Crew [KOG]</option>
<option>NOTHING From Crew [KOG]</option>
<option>NeeraTea From Crew [KOG]</option>
<option>1smesayo From Crew [KAOMANGAI]</option>
<option>S8R4n From Crew [SSYT]</option>
<option>BANK From Crew [SSYT & KOG]</option>
<option>Lazarus From Crew [SSYT]</option>
<option>Zero From Crew [SSYT]</option>
<option>AUGUST From Crew [SSYT]</option>
</select>

<label>📄 คำแนะนำ</label>
<textarea id="note" placeholder="เขียนคำแนะนำ..."></textarea>

</div>

<button onclick="submitScore()">บันทึก</button>

<audio id="saveSound" src="เสียงเอฟเฟค1.mp3"></audio>

<script>

// 🔥 API Google Sheet
const API = "https://opensheet.elk.sh/1L27Z6gjEPd4FHEkDvQ_oq1JiupQMTVvdLXegG1GQd-8/Form_Responses";

// 🔥 Webhook
const WEBHOOK = "https://discord.com/api/webhooks/1470701672174190675/7sZp7dNpq0gJ3un7TY8w6-zVCsohiZ7YNoH9iW6J8D9aompqsREkdfvlGE5LiskRzEhE";

let players = [];

// โหลดข้อมูล
fetch(API)
.then(res=>res.json())
.then(data=>{
  players=data;

  const select=document.getElementById("playerSelect");

  data.forEach((p,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.text=p["ชื่อเล่น"] + " (" + p["ชื่อ Roblox เช่น @SaranRTDJ"] + ")";
    select.appendChild(opt);
  });
});

// เปลี่ยนคน
document.getElementById("playerSelect").onchange=function(){
  const p=players[this.value];

  document.getElementById("infoBox").innerHTML=`
  👤 ชื่อ: ${p["ชื่อเล่น"]}<br>
  🎮 Roblox: ${p["ชื่อ Roblox เช่น @SaranRTDJ"]}<br>
  💰 ค่าหัว: ${p["ค่าหัวเท่าไหร่ ตอบเช่น 30M 29.9M 25M"]}<br>
  📝 เหตุผล: ${p["สาเหตุที่อยากเข้า"]}<br>
  ⚔️ เซ็ท: ${p["เซ็ทที่เล่น"]}
  `;
};

// หมวดคะแนน
const CATEGORIES = [
 {k:"ken",t:"👁️ เคน",m:8},
 {k:"pos",t:"🧍 โซ่ติดตัว",m:17},
 {k:"aim",t:"🎯 สกิล",m:14},
 {k:"dodge",t:"🛡️ เอาตัวรอด",m:14},
 {k:"value",t:"💎 ใช้ของ",m:14},
 {k:"combo",t:"⚡ คอมโบ",m:16},
 {k:"iq",t:"🧠 ตัดสินใจ",m:17},
];

const sliders=document.getElementById("sliders");

CATEGORIES.forEach(c=>{
  sliders.innerHTML+=`
  <div class="slider-box">
    ${c.t} (<span id="v-${c.k}">0</span> / ${c.m})
    <input type="range" min="0" max="${c.m}" value="0"
    oninput="update('${c.k}',this.value)">
  </div>
  `;
});

function update(k,v){
  document.getElementById("v-"+k).innerText=v;
  calc();
}

function calc(){
  let total=0;
  CATEGORIES.forEach(c=>{
    total+=Number(document.getElementById("v-"+c.k).innerText);
  });
  document.getElementById("total").innerText=total;
}

// 🔥 ส่ง Discord
function submitScore(){
    const sound = document.getElementById("saveSound");
    sound.currentTime = 0;
    sound.play();

  const p = players[document.getElementById("playerSelect").value];
  const total = Number(document.getElementById("total").innerText);

  const pass = total >= 41 ? "ผ่าน" : "ไม่ผ่าน";

  // 🔥 เพิ่มใหม่
  const passCount = document.getElementById("passCount").value;
  const roundCount = document.getElementById("roundCount").value;
  const tester = document.getElementById("tester").value;
  const note = document.getElementById("note").value;

  const get = k => document.getElementById("v-"+k).innerText;

  fetch(WEBHOOK,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      embeds:[{
        title:"📋 ผลการเทสเข้าแคลน",
        color: pass==="ผ่าน" ? 65280 : 16711680,
        description:
`👤 ผู้เล่น: ${p["ชื่อ Roblox เช่น @SaranRTDJ"]}
💰 Bounty: ${p["ค่าหัวเท่าไหร่ ตอบเช่น 30M 29.9M 25M"]}

📝 เหตุผล: ${p["สาเหตุที่อยากเข้า"]}
⚔️ เซ็ท: ${p["เซ็ทที่เล่น"]}

🎯 คะแนนรวม: ${total} / 100

👁️ เคน: ${get("ken")}
🧍 โซ่ติดตัว: ${get("pos")}
🎯 สกิล: ${get("aim")}
🛡️ เอาตัวรอด: ${get("dodge")}
💎 ใช้ของ: ${get("value")}
⚡ คอมโบ: ${get("combo")}
🧠 ตัดสินใจ: ${get("iq")}

📊 ผลลัพธ์: ${pass}

🏆 ชนะ: ${passCount} / ${roundCount}
👤 คนเทส: ${tester}

📄 คำแนะนำ:
${note}`
      }]
    })
  })
  .then(()=>{
    alert("ส่ง Discord สำเร็จ ✅");
  })
  .catch(()=>{
    alert("ส่งไม่สำเร็จ ❌");
  });

}

</script>

</body>
</html>
